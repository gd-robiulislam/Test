backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "data"
    label: "Data"
    delete: false
    editor:
      preview: false
    files:
      - name: "portfolio"
        label: "Portfolio List"
        file: "projects.json"
        fields:
          - name: "projects"
            label: "Projects"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Category", name: "category", widget: "string"}