<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CMS Test Site</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
    <h1>My Admin Projects</h1>
    <div id="project-container">
        </div>

    <script>
        async function loadTestProjects() {
            try {
                // We add a timestamp to the URL to prevent the browser from caching old versions
                const response = await fetch('/projects.json?t=' + Date.now());
                const data = await response.json();
                const container = document.getElementById('project-container');
                
                container.innerHTML = ''; // Clear container

                data.projects.forEach(p => {
                    const div = document.createElement('div');
                    div.style.border = "1px solid cyan";
                    div.style.margin = "10px";
                    div.innerHTML = `<h3>${p.title}</h3><p>${p.category}</p>`;
                    container.appendChild(div);
                });
            } catch (e) {
                console.log("No projects found yet. Go to /admin to add one!");
            }
        }
        window.onload = loadTestProjects;
    </script>
</body>
</html>
